# Continuous integration: typecheck, build, and tests on every PR and main-branch push.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm
        uses: pnpm/action-setup@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (types)
        run: pnpm run lint:types

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test
