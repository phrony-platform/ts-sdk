# Publishes to npm using OIDC trusted publishing (no long-lived NPM_TOKEN).
#
# Prereqs:
# 1. npmjs.com → your package → Settings → Trusted publishing → GitHub Actions.
#    Workflow filename must match exactly: publish.yml (npm validates on publish).
# 2. package.json "repository.url" must match this GitHub repo URL (npm validates).
# 3. Requires Node >= 22.14 and npm CLI >= 11.5.1 for OIDC (CI uses Node 24).
# 4. If you use private npm dependencies, use a read-only token for install only
#    (see https://docs.npmjs.com/trusted-publishers — “Handling private dependencies”).
#
# Triggers: push a version tag matching v* (e.g. v0.1.1), or run the workflow manually.

name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write # required for OIDC (GitHub → npm token exchange)
  contents: read

concurrency:
  group: publish-npm
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm
        uses: pnpm/action-setup@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint:types

      - name: Test
        run: pnpm test

      # npm CLI performs the OIDC exchange for trusted publishing (pnpm publish can differ).
      # prepublishOnly in package.json still runs `pnpm run build` via npm’s lifecycle.
      # Provenance is automatic for trusted publishing from GitHub Actions on public repos.
      - name: Publish to npm
        run: npm publish
