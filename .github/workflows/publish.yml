# Publishes to npm when you publish a GitHub Release, or when you run the workflow manually.
#
# Prereqs:
# 1. Create repository secret NPM_TOKEN: npm > Access Tokens > Granular token with
#    "Publish" for @phrony/sdk (or the package name), and automation/bypass-2fa if you use 2FA.
# 2. package.json "version" must match what you want on the registry; bump it, commit, tag (optional), then
#    create a GitHub Release (or use "Run workflow" after bumping).
# 3. @phrony org must exist on npm, or change the package "name" in package.json.

name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      # `prepublishOnly` in package.json runs the build; publish runs after that.
      - name: Publish to npm
        run: pnpm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
